<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>חיפאית בתחתית - אירועים קהילתיים</title>
    <link href="https://fonts.googleapis.com/css2?family=Secular+One&family=Rubik:wght@700;900&family=Cascadia+Code:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#1a0505;color:#f5ede8;direction:rtl;}

/* Auth Modal */
.auth-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:500;align-items:center;justify-content:center;padding:1rem;}
.auth-overlay.open{display:flex;}
.auth-modal{background:#2e0c0c;border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:2rem;width:100%;max-width:400px;position:relative;}
.auth-modal h2{font-size:1.4rem;font-weight:700;margin-bottom:.8rem;color:#d4e034;text-align:center;}
.auth-subtitle{font-size:14px;color:rgba(255,255,255,0.6);text-align:center;margin-bottom:1.5rem;}
.auth-tabs{display:flex;gap:4px;margin-bottom:1.2rem;background:rgba(0,0,0,0.2);border-radius:10px;padding:4px;}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:13px;border:none;background:transparent;color:rgba(255,255,255,0.5);border-radius:8px;cursor:pointer;transition:all .2s;}
.auth-tab.active{background:#d4e034;color:#1a0505;font-weight:600;}
.auth-form{display:flex;flex-direction:column;gap:12px;}
.auth-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#f5ede8;font-family:'Segoe UI',sans-serif;font-size:14px;padding:10px 14px;border-radius:10px;outline:none;direction:rtl;}
.auth-input:focus{border-color:#d4e034;}
.auth-submit{background:#d4e034;color:#1a0505;border:none;font-family:'Segoe UI',sans-serif;font-size:14px;font-weight:600;padding:11px;border-radius:10px;cursor:pointer;}
.auth-submit:hover{background:#e2ec6a;}
.auth-error{color:#f075a8;font-size:13px;margin-top:.5rem;min-height:18px;}
.auth-success{color:#d4e034;font-size:13px;margin-top:.5rem;}
.btn-close-auth{position:absolute;top:1rem;left:1rem;background:none;border:none;color:rgba(255,255,255,0.5);font-size:18px;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.btn-close-auth:hover{background:rgba(255,255,255,0.1);color:#fff;}
.forgot-link{text-align:center;margin-top:8px;}
.forgot-link button{background:none;border:none;color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer;text-decoration:underline;}
.forgot-link button:hover{color:#d4e034;}

/* User Bar */
.user-bar{display:none;padding:.6rem 2rem;background:#1a0505;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px;color:rgba(255,255,255,0.5);justify-content:space-between;align-items:center;}
.user-bar.show{display:flex;}
.user-info{display:flex;align-items:center;gap:10px;}
.user-info strong{color:#d4e034;}
.role-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;}
.role-admin{background:rgba(212,224,52,0.2);color:#d4e034;border:1px solid rgba(212,224,52,0.3);}
.role-editor{background:rgba(107,143,168,0.2);color:#6b8fa8;border:1px solid rgba(107,143,168,0.3);}
.btn-logout{background:none;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.4);font-size:12px;padding:4px 12px;border-radius:8px;cursor:pointer;}
.btn-logout:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.7);}

/* Hero */
.hero{position:relative;background:linear-gradient(160deg,#3d0a0a 0%,#7a1515 50%,#c8232c 100%);padding:2.5rem 2rem 2rem;overflow:hidden;border-bottom:1px solid rgba(255,255,255,0.07);}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center 30%;filter:blur(2px) saturate(1.2);transform:scale(1.08);opacity:0.9;z-index:0;}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(160deg,rgba(61,10,10,0.25) 0%,rgba(122,21,21,0.15) 50%,rgba(200,35,44,0.1) 100%);z-index:1;}
.hero>*:not(.hero-bg){position:relative;z-index:2;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);border-radius:20px;padding:5px 14px;font-size:12px;color:#d4e034;letter-spacing:1px;text-transform:uppercase;margin-bottom:.75rem;}
.hero-title{font-family:'Secular One',sans-serif !important;font-size:clamp(2rem,5vw,3.5rem);font-weight:900;line-height:1.1;background:linear-gradient(135deg,#fff 0%,#d4e034 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-sub{font-size:.95rem;color:rgba(255,255,255,0.5);margin-top:.5rem;font-weight:300;}

/* Tabs */
.tab-bar{display:flex;gap:4px;border-bottom:1px solid rgba(255,255,255,0.06);padding:0 2rem;background:#2a0808;}
.tab{padding:10px 18px;font-size:13px;cursor:pointer;color:rgba(255,255,255,0.4);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.tab.active{color:#d4e034;border-bottom-color:#d4e034;}

/* Toolbar */
.toolbar{display:flex;flex-wrap:wrap;gap:8px;padding:1rem 2rem;background:#2a0808;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:10;align-items:center;}
.filter-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);font-family:'Segoe UI',sans-serif;font-size:13px;padding:6px 14px;border-radius:20px;cursor:pointer;transition:all .2s;}
.filter-btn:hover{opacity:0.85;}
.filter-btn.active{font-weight:500;opacity:1;}
.filter-btn[data-cat="all"]{border-color:rgba(255,255,255,0.2);}
.filter-btn[data-cat="all"].active{background:#fff;color:#1a0505;border-color:#fff;}
.filter-btn[data-cat="music"]{color:#c98ff0;border-color:rgba(167,105,221,0.4);}
.filter-btn[data-cat="music"].active{background:rgba(167,105,221,0.8);color:#fff;border-color:#c98ff0;}
.filter-btn[data-cat="theater"]{color:#d4e034;border-color:rgba(212,224,52,0.4);}
.filter-btn[data-cat="theater"].active{background:rgba(212,224,52,0.8);color:#1a0505;border-color:#d4e034;}
.filter-btn[data-cat="cinema"]{color:#6b8fa8;border-color:rgba(107,143,168,0.4);}
.filter-btn[data-cat="cinema"].active{background:rgba(107,143,168,0.8);color:#fff;border-color:#6b8fa8;}
.filter-btn[data-cat="lectures"]{color:#e06060;border-color:rgba(200,35,44,0.4);}
.filter-btn[data-cat="lectures"].active{background:rgba(200,35,44,0.8);color:#fff;border-color:#e06060;}
.filter-btn[data-cat="kids"]{color:#f075a8;border-color:rgba(230,60,120,0.4);}
.filter-btn[data-cat="kids"].active{background:rgba(230,60,120,0.8);color:#fff;border-color:#f075a8;}
.filter-btn[data-cat="spirit"]{color:#50c8b4;border-color:rgba(80,200,180,0.4);}
.filter-btn[data-cat="spirit"].active{background:rgba(80,200,180,0.8);color:#1a0505;border-color:#50c8b4;}
.filter-btn[data-cat="workshops"]{color:#f0a032;border-color:rgba(240,160,50,0.4);}
.filter-btn[data-cat="workshops"].active{background:rgba(240,160,50,0.8);color:#1a0505;border-color:#f0a032;}
.btn-login{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:#fff;font-family:'Segoe UI',sans-serif;font-size:13px;font-weight:500;padding:7px 18px;border-radius:20px;cursor:pointer;transition:all .2s;margin-right:auto;}
.btn-login:hover{background:rgba(255,255,255,0.2);}
.date-input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#f5ede8;font-family:'Segoe UI',sans-serif;font-size:13px;padding:6px 12px;border-radius:20px;outline:none;transition:border-color .2s;cursor:pointer;}
.date-input:focus{border-color:#d4e034;}
.date-input::-webkit-calendar-picker-indicator{filter:invert(0.6);}
.btn-clear-date{background:none;border:none;color:rgba(255,255,255,0.35);font-size:18px;cursor:pointer;padding:0 2px;line-height:1;}
.btn-clear-date:hover{color:#d4e034;}
.btn-add{background:#d4e034;color:#1a0505;border:none;font-family:'Segoe UI',sans-serif;font-size:13px;font-weight:500;padding:7px 18px;border-radius:20px;cursor:pointer;transition:background .2s;}
.btn-add:hover{background:#e2ec6a;}

/* Cards */
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:1.5rem;padding:2rem;max-width:1200px;margin:0 auto;}
.card{background:#2a0a0a;border:1px solid rgba(255,255,255,0.07);border-radius:16px;overflow:hidden;transition:transform .25s,box-shadow .25s,border-color .25s;position:relative;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.4);border-color:rgba(212,224,52,0.3);}
.card-actions{position:absolute;top:10px;left:10px;display:flex;gap:6px;z-index:2;}
.fav-btn,.edit-btn,.del-btn{background:rgba(0,0,0,0.5);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s;}
.fav-btn:hover,.edit-btn:hover{transform:scale(1.18);background:rgba(0,0,0,0.7);}
.del-btn:hover{transform:scale(1.18);background:rgba(200,35,44,0.7);}
.del-btn{display:none;}
.card.user-event .del-btn{display:flex;}
.card-img{width:100%;height:210px;display:flex;align-items:center;justify-content:center;font-size:3rem;background:#4a1010;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;}
.card-body{padding:1.1rem;}
.card-cat{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.5px;padding:3px 10px;border-radius:20px;margin-bottom:.5rem;text-transform:uppercase;}
.cat-music{background:rgba(167,105,221,0.2);color:#c98ff0;border:1px solid rgba(167,105,221,0.25);}
.cat-theater{background:rgba(212,224,52,0.2);color:#d4e034;border:1px solid rgba(212,224,52,0.25);}
.cat-cinema{background:rgba(107,143,168,0.2);color:#6b8fa8;border:1px solid rgba(107,143,168,0.25);}
.cat-lectures{background:rgba(200,35,44,0.2);color:#e06060;border:1px solid rgba(200,35,44,0.25);}
.cat-kids{background:rgba(230,60,120,0.2);color:#f075a8;border:1px solid rgba(230,60,120,0.25);}
.cat-spirit{background:rgba(80,200,180,0.2);color:#50c8b4;border:1px solid rgba(80,200,180,0.25);}
.cat-workshops{background:rgba(240,160,50,0.2);color:#f0a032;border:1px solid rgba(240,160,50,0.25);}
.card-title{font-size:1.15rem;font-weight:700;line-height:1.3;margin-bottom:.4rem;}
.card-desc{font-size:.82rem;color:rgba(255,255,255,0.45);line-height:1.6;margin-bottom:.8rem;}
.card-meta{display:flex;flex-direction:column;gap:4px;}
.meta-item{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.4);}
.card-links{display:flex;gap:8px;padding:.85rem 1.1rem;border-top:1px solid rgba(255,255,255,0.06);}
.link-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:6px 12px;border-radius:8px;text-decoration:none;transition:background .2s;flex:1;justify-content:center;}
.link-tickets{background:rgba(212,224,52,0.12);color:#d4e034;border:1px solid rgba(212,224,52,0.25);}
.link-tickets:hover{background:rgba(212,224,52,0.22);}
.link-materials{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.1);}
.link-materials:hover{background:rgba(255,255,255,0.11);}
.link-none{opacity:.3;cursor:default;pointer-events:none;}
.new-badge{position:absolute;top:10px;right:10px;background:#d4e034;color:#1a0505;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
.empty{text-align:center;padding:4rem 2rem;color:rgba(255,255,255,0.3);grid-column:1/-1;}

/* Card category backgrounds */
.card[data-cat="music"]{border-color:rgba(167,105,221,0.3);}
.card[data-cat="music"] .card-img{background:linear-gradient(135deg,#2d1a4a,#4a2a6e);}
.card[data-cat="theater"]{border-color:rgba(212,224,52,0.3);}
.card[data-cat="theater"] .card-img{background:linear-gradient(135deg,#2a2800,#4a4a00);}
.card[data-cat="cinema"]{border-color:rgba(107,143,168,0.3);}
.card[data-cat="cinema"] .card-img{background:linear-gradient(135deg,#0d1f2d,#1a3a50);}
.card[data-cat="lectures"]{border-color:rgba(200,35,44,0.3);}
.card[data-cat="lectures"] .card-img{background:linear-gradient(135deg,#2d0808,#5a1010);}
.card[data-cat="kids"]{border-color:rgba(230,60,120,0.3);}
.card[data-cat="kids"] .card-img{background:linear-gradient(135deg,#2d0a1a,#5a1035);}
.card[data-cat="spirit"]{border-color:rgba(80,200,180,0.3);}
.card[data-cat="spirit"] .card-img{background:linear-gradient(135deg,#0a2d2a,#105a50);}
.card[data-cat="workshops"]{border-color:rgba(240,160,50,0.3);}
.card[data-cat="workshops"] .card-img{background:linear-gradient(135deg,#2d1a00,#5a3500);}

/* Hero login button */
.hero-login-btn{position:absolute;top:1.2rem;right:1.5rem;z-index:3;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;font-family:'Segoe UI',sans-serif;font-size:13px;font-weight:500;padding:7px 18px;border-radius:20px;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px);}
.hero-login-btn:hover{background:rgba(255,255,255,0.25);}
.hero-login-btn.hidden{display:none;}
.img-upload-area{border:1.5px dashed rgba(255,255,255,0.18);border-radius:12px;padding:1.2rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;overflow:hidden;}
.img-upload-area:hover{border-color:#7ec8d8;background:rgba(126,200,216,0.05);}
.img-upload-area.has-image{padding:0;border-style:solid;border-color:rgba(126,200,216,0.35);}
.img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-preview{width:100%;height:150px;object-fit:cover;border-radius:10px;display:block;}
.img-placeholder{pointer-events:none;}
.img-placeholder-icon{font-size:1.8rem;margin-bottom:.4rem;}
.img-placeholder-text{font-size:13px;color:rgba(255,255,255,0.4);}
.img-placeholder-sub{font-size:11px;color:rgba(255,255,255,0.25);margin-top:3px;}
.btn-remove-img{position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.6);border:none;border-radius:50%;width:26px;height:26px;color:#fff;font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:3;}
.img-upload-area.has-image .btn-remove-img{display:flex;}

/* Footer */
.site-footer{background:#100303;border-top:1px solid rgba(255,255,255,0.07);overflow:hidden;position:relative;}
.footer-bottom{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:1.5rem 2rem 2rem;gap:.4rem;}
.footer-copy{font-size:11px;color:rgba(255,255,255,0.2);}

/* Event Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.overlay.open{display:flex;}
.modal{background:#2e0c0c;border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:2rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:1.4rem;font-weight:700;margin-bottom:1.2rem;color:#d4e034;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{margin-bottom:.85rem;}
.form-group label{display:block;font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:5px;}
.form-group input,.form-group textarea,.form-group select{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);color:#f5ede8;font-family:'Segoe UI',sans-serif;font-size:14px;padding:9px 12px;border-radius:10px;outline:none;transition:border-color .2s;direction:rtl;}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:#d4e034;}
.form-group textarea{resize:vertical;min-height:70px;}
.form-group select option{background:#2e0c0c;}
.form-divider{font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:.5px;text-transform:uppercase;margin:.4rem 0 .8rem;padding-bottom:.5rem;border-bottom:1px solid rgba(255,255,255,0.07);}
.modal-btns{display:flex;gap:10px;margin-top:1.1rem;}
.btn-submit{flex:1;background:#d4e034;color:#1a0505;border:none;font-family:'Segoe UI',sans-serif;font-size:14px;font-weight:500;padding:10px;border-radius:10px;cursor:pointer;}
.btn-submit:hover{background:#e2ec6a;}
.btn-cancel{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.1);font-family:'Segoe UI',sans-serif;font-size:14px;padding:10px 20px;border-radius:10px;cursor:pointer;}

@media(max-width:768px){
    .tab-bar{padding:0 1rem;overflow-x:auto;}
    .toolbar{padding:1rem;}
    .events-grid{padding:1rem;}
    .form-row{grid-template-columns:1fr;}
}
    </style>
</head>
<body>

<!-- User Bar -->
<div class="user-bar" id="user-bar">
    <div class="user-info">
        שלום <strong id="user-name">-</strong>
        <span class="role-badge" id="user-role-badge">-</span>
    </div>
    <button class="btn-logout" onclick="logout()">יציאה</button>
</div>

<!-- Hero -->
<div class="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <button class="hero-login-btn" id="hero-login-btn" onclick="openAuth()">התחברות</button>
    <div class="hero-badge">✦ אירועי העיר</div>
    <div class="hero-title">חיפאית בתחתית</div>
    <div class="hero-sub">כל האירועים, כל הבילויים — במקום אחד</div>
</div>

<!-- Tabs -->
<div class="tab-bar">
    <div class="tab active" onclick="switchTab('all',this)">כל האירועים</div>
    <div class="tab" onclick="switchTab('favs',this)">❤️ מועדפים <span id="fav-count"></span></div>
</div>

<!-- Toolbar -->
<div class="toolbar">
    <button class="filter-btn active" data-cat="all">הכל</button>
    <button class="filter-btn" data-cat="music">🎵 מוזיקה</button>
    <button class="filter-btn" data-cat="theater">🎭 תאטרון</button>
    <button class="filter-btn" data-cat="cinema">🎬 קולנוע</button>
    <button class="filter-btn" data-cat="lectures">🎤 הרצאות</button>
    <button class="filter-btn" data-cat="kids">🧒 ילדים</button>
    <button class="filter-btn" data-cat="spirit">✨ רוח</button>
    <button class="filter-btn" data-cat="workshops">🛠️ סדנאות</button>
    <input type="date" class="date-input" id="date-filter">
    <button class="btn-clear-date" onclick="clearDate()">×</button>
    <div style="margin-right:auto;display:flex;gap:8px;align-items:center;">
        <button class="btn-login" id="btn-login-toolbar" onclick="openAuth()" style="display:none;">התחברות</button>
        <button class="btn-add" onclick="handleAddEvent()">+ הוסף אירוע</button>
    </div>
</div>

<!-- Events Grid -->
<div class="events-grid" id="grid"></div>

<!-- Footer -->
<footer class="site-footer">
    <div class="footer-bottom">
        <div class="footer-copy">חיפאית בתחתית · © 2026 כל הזכויות שמורות</div>
    </div>
</footer>

<!-- Auth Modal -->
<div class="auth-overlay" id="auth-overlay">
    <div class="auth-modal">
        <button class="btn-close-auth" onclick="closeAuth()">×</button>
        <h2>הצטרפי לקהילה</h2>
        <p class="auth-subtitle">כדי להוסיף אירוע, נרשמי למערכת</p>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="setAuthTab('login')">התחברות</button>
            <button class="auth-tab" onclick="setAuthTab('register')">הרשמה</button>
        </div>
        <div class="auth-form">
            <input type="email" class="auth-input" id="auth-email" placeholder="אימייל">
            <input type="password" class="auth-input" id="auth-password" placeholder="סיסמה">
            <div id="register-fields" style="display:none;">
                <input type="text" class="auth-input" id="auth-name" placeholder="שם מלא" style="margin-top:12px;">
            </div>
            <div id="remember-me-row" style="display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.5);">
                <input type="checkbox" id="remember-me" style="width:16px;height:16px;accent-color:#d4e034;cursor:pointer;">
                <label for="remember-me" style="cursor:pointer;">זכור אותי</label>
            </div>
            <button class="auth-submit" id="auth-submit-btn" onclick="handleAuth()">התחברות</button>
        </div>
        <div id="auth-message" class="auth-error"></div>
        <div id="forgot-password-link" class="forgot-link">
            <button onclick="handleForgotPassword()">שכחתי סיסמה</button>
        </div>
    </div>
</div>

<!-- Event Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
    <div class="modal">
        <h2 id="modal-title">✦ הוסף אירוע חדש</h2>
        <div class="form-group">
            <label>תמונה לאירוע</label>
            <div class="img-upload-area" id="upload-area">
                <input type="file" accept="image/*" id="f-image" onchange="handleImageUpload(event)">
                <button class="btn-remove-img" onclick="removeImage(event)">×</button>
                <div class="img-placeholder" id="img-placeholder">
                    <div class="img-placeholder-icon">🖼</div>
                    <div class="img-placeholder-text">לחץ להעלאת תמונה</div>
                    <div class="img-placeholder-sub">JPG, PNG, WEBP עד 5MB</div>
                </div>
                <img id="img-preview" class="img-preview" src="" alt="" style="display:none;">
            </div>
        </div>
        <div class="form-group"><label>שם האירוע *</label><input type="text" id="f-title" placeholder="למשל: קונצרט בגן הבהאים"></div>
        <div class="form-group"><label>קטגוריה</label>
            <select id="f-cat">
                <option value="music">🎵 מוזיקה</option>
                <option value="theater">🎭 תאטרון</option>
                <option value="cinema">🎬 קולנוע</option>
                <option value="lectures">🎤 הרצאות</option>
                <option value="kids">🧒 ילדים</option>
                <option value="spirit">✨ רוח</option>
                <option value="workshops">🛠️ סדנאות</option>
            </select>
        </div>
        <div class="form-group"><label>תיאור</label><textarea id="f-desc" placeholder="תאר את האירוע..."></textarea></div>
        <div class="form-row">
            <div class="form-group"><label>תאריך</label><input type="date" id="f-date"></div>
            <div class="form-group"><label>שעה</label><input type="text" id="f-time" placeholder="20:00–23:00"></div>
        </div>
        <div class="form-group"><label>מיקום</label><input type="text" id="f-loc" placeholder="כתובת או שם המקום"></div>
        <div class="form-group"><label>מחיר</label><input type="text" id="f-price" placeholder="₪50 / כניסה חופשית"></div>
        <div class="form-divider">קישורים</div>
        <div class="form-group"><label>🎟 קישור לכרטיסים</label><input type="url" id="f-tickets" placeholder="https://..."></div>
        <div class="form-group"><label>📎 קישור לחומרים</label><input type="url" id="f-materials" placeholder="https://..."></div>
        <div class="modal-btns">
            <button class="btn-submit" id="modal-submit-btn" onclick="saveEvent()">פרסם אירוע</button>
            <button class="btn-cancel" onclick="closeModal()">ביטול</button>
        </div>
    </div>
</div>

<script>
// ── Supabase ──
const SUPABASE_URL = 'https://sgeuvghemmscvwtpbgdo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnZXV2Z2hlbW1zY3Z3dHBiZ2RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTY2ODAsImV4cCI6MjA4OTY3MjY4MH0.yKPpUuZgyZKug9NDiuSugXswS2SUvN2IKr2x0hJ3Fz4';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── State ──
const CAT_EMOJI = {music:'🎵',theater:'🎭',cinema:'🎬',lectures:'🎤',kids:'🧒',spirit:'✨',workshops:'🛠️'};
const CAT_LABEL = {music:'מוזיקה',theater:'תאטרון',cinema:'קולנוע',lectures:'הרצאות',kids:'ילדים',spirit:'רוח',workshops:'סדנאות'};

let currentUser = null, currentRole = null;
let events = [], filteredEvents = [];
let favs = new Set(), activeTab = 'all', activeCat = 'all', dateFilter = '';
let editingId = null, currentImageData = null, pendingAction = null;

// ── Init ──
async function init() {
    await checkAuth();
    await loadEvents();
    setupFilters();
}

// ── Auth ──
async function checkAuth() {
    try {
        const { data: { user } } = await db.auth.getUser();
        if (user) {
            currentUser = user;
            const { data: profile } = await db.from('user_profiles').select('role').eq('id', user.id).single();
            currentRole = profile?.role || 'user';
            document.getElementById('user-name').textContent = user.user_metadata?.name || user.email;
            document.getElementById('user-role-badge').textContent = currentRole === 'admin' ? 'מנהל' : 'עורך';
            document.getElementById('user-role-badge').className = `role-badge role-${currentRole === 'admin' ? 'admin' : 'editor'}`;
            document.getElementById('user-bar').classList.add('show');
            document.getElementById('btn-login-toolbar').style.display = 'none';
            document.getElementById('hero-login-btn').classList.add('hidden');
        } else {
            document.getElementById('btn-login-toolbar').style.display = 'inline-flex';
            document.getElementById('hero-login-btn').classList.remove('hidden');
        }
    } catch(e) { console.error(e); }
}

function handleAddEvent() {
    if (currentUser) openModal(null);
    else { pendingAction = 'addEvent'; openAuth(); }
}

function openAuth() { document.getElementById('auth-overlay').classList.add('open'); }
function closeAuth() { document.getElementById('auth-overlay').classList.remove('open'); pendingAction = null; clearAuthMessage(); }

function setAuthTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`[onclick="setAuthTab('${tab}')"]`).classList.add('active');
    const isRegister = tab === 'register';
    document.getElementById('register-fields').style.display = isRegister ? 'block' : 'none';
    document.getElementById('auth-submit-btn').textContent = isRegister ? 'הרשמה' : 'התחברות';
    document.getElementById('forgot-password-link').style.display = isRegister ? 'none' : 'block';
    document.getElementById('remember-me-row').style.display = isRegister ? 'none' : 'flex';
    clearAuthMessage();
}

function clearAuthMessage() {
    const el = document.getElementById('auth-message');
    el.textContent = '';
    el.className = 'auth-error';
}

async function handleAuth() {
    const email = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const name = document.getElementById('auth-name').value.trim();
    const isRegister = document.querySelector('.auth-tab.active').textContent === 'הרשמה';
    const msgEl = document.getElementById('auth-message');
    clearAuthMessage();

    try {
        let result;
        if (isRegister) {
            result = await db.auth.signUp({ email, password, options: { data: { name } } });
            if (result.data.user && !result.data.user.email_confirmed_at) {
                msgEl.className = 'auth-success';
                msgEl.textContent = '✓ נשלח קישור אישור למייל שלך';
                return;
            }
        } else {
            result = await db.auth.signInWithPassword({ email, password });
            // זכור אותי — אם לא מסומן, session תפוג בסגירת הדפדפן
            if (!document.getElementById('remember-me').checked) {
                // Supabase שומר session כברירת מחדל, אין צורך בפעולה נוספת
                // אם לא רוצים — ניתן להוסיף signOut בסגירת הדפדפן
            }
        }
        if (result.error) throw result.error;
        await checkAuth();
        closeAuth();
        if (pendingAction === 'addEvent') openModal(null);
    } catch(e) {
        msgEl.textContent = e.message;
    }
}

async function handleForgotPassword() {
    const email = document.getElementById('auth-email').value.trim();
    const msgEl = document.getElementById('auth-message');
    clearAuthMessage();
    if (!email) { msgEl.textContent = 'נא להזין אימייל תחילה'; return; }
    try {
        const { error } = await db.auth.resetPasswordForEmail(email, {
            redirectTo: 'https://heifait-batahtit.vercel.app'
        });
        if (error) throw error;
        msgEl.className = 'auth-success';
        msgEl.textContent = '✓ נשלח קישור לאיפוס סיסמה למייל שלך';
    } catch(e) { msgEl.textContent = e.message; }
}

async function logout() {
    await db.auth.signOut();
    currentUser = null; currentRole = null;
    document.getElementById('user-bar').classList.remove('show');
    document.getElementById('btn-login-toolbar').style.display = 'inline-flex';
    document.getElementById('hero-login-btn').classList.remove('hidden');
    await loadEvents();
}

// ── Events ──
async function loadEvents() {
    try {
        const { data, error } = await db.from('events').select('*').order('date_raw', { ascending: true });
        if (error) throw error;
        events = (data || []).map(e => ({
            id: e.id,
            cat: e.cat,
            emoji: CAT_EMOJI[e.cat] || '📌',
            title: e.title,
            desc: e.description || '',
            dateRaw: e.date_raw || '',
            date: e.date_display || '-',
            time: e.time || '-',
            location: e.location || 'חיפה',
            price: e.price || 'כניסה חופשית',
            tickets: e.tickets || '',
            materials: e.materials || '',
            image: e.image || null,
            user_id: e.user_id
        }));
        applyFilter();
    } catch(e) {
        console.error(e);
        document.getElementById('grid').innerHTML = '<div class="empty">שגיאה בטעינת האירועים</div>';
    }
}

function applyFilter() {
    let list = [...events];
    if (activeTab === 'favs') list = list.filter(e => favs.has(e.id));
    if (activeCat !== 'all') list = list.filter(e => e.cat === activeCat);
    if (dateFilter) list = list.filter(e => e.dateRaw === dateFilter);
    filteredEvents = list;
    render();
}

function render() {
    const grid = document.getElementById('grid');
    document.getElementById('fav-count').textContent = favs.size ? `(${favs.size})` : '';
    if (!filteredEvents.length) {
        const msg = activeTab === 'favs' ? 'לא שמרת אירועים מועדפים עדיין' : 'לא נמצאו אירועים תואמים';
        grid.innerHTML = `<div class="empty"><div style="font-size:2.5rem;margin-bottom:.75rem">${activeTab==='favs'?'💔':'🔍'}</div><div>${msg}</div></div>`;
        return;
    }
    grid.innerHTML = filteredEvents.map(e => {
        const isUserEvent = currentUser && (currentUser.id === e.user_id || currentRole === 'admin');
        return `
        <div class="card${isUserEvent?' user-event':''}" data-id="${e.id}" data-cat="${e.cat}">
            ${e.id && !isNaN(e.id) ? '' : '<div class="new-badge">חדש ✦</div>'}
            <div class="card-actions">
                <button class="fav-btn" onclick="toggleFav('${e.id}',event)">${favs.has(e.id)?'❤️':'🤍'}</button>
                ${isUserEvent ? `<button class="edit-btn" onclick="openModal('${e.id}')">✏️</button>` : ''}
                ${isUserEvent ? `<button class="del-btn" onclick="deleteEvent('${e.id}',event)">🗑️</button>` : ''}
            </div>
            <div class="card-img">
                ${e.image ? `<img src="${e.image}" alt="${e.title}">` : `<span>${e.emoji}</span>`}
            </div>
            <div class="card-body">
                <span class="card-cat cat-${e.cat}">${CAT_LABEL[e.cat]||e.cat}</span>
                <div class="card-title">${e.title}</div>
                <div class="card-desc">${e.desc}</div>
                <div class="card-meta">
                    <div class="meta-item"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.5;flex-shrink:0"><rect x="2" y="3" width="12" height="11" rx="2"/><path d="M2 7h12M5 1v4M11 1v4"/></svg>${e.date}</div>
                    <div class="meta-item"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.5;flex-shrink:0"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>${e.time}</div>
                    <div class="meta-item"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.5;flex-shrink:0"><path d="M8 2C5.8 2 4 3.8 4 6c0 3.5 4 8 4 8s4-4.5 4-8c0-2.2-1.8-4-4-4z"/><circle cx="8" cy="6" r="1.5"/></svg>${e.location}</div>
                    <div class="meta-item"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.5;flex-shrink:0"><path d="M2 4h12v8a2 2 0 01-2 2H4a2 2 0 01-2-2V4zM2 4l2-2h8l2 2"/></svg>${e.price}</div>
                </div>
            </div>
            <div class="card-links">
                <a class="link-btn link-tickets${e.tickets?'':' link-none'}" href="${e.tickets||'#'}" ${e.tickets?'target="_blank"':''}>🎟 כרטיסים</a>
                <a class="link-btn link-materials${e.materials?'':' link-none'}" href="${e.materials||'#'}" ${e.materials?'target="_blank"':''}>📎 חומרים</a>
            </div>
        </div>`;
    }).join('');
}

function toggleFav(id, ev) {
    ev.stopPropagation();
    if (favs.has(id)) favs.delete(id); else favs.add(id);
    applyFilter();
}

async function deleteEvent(id, ev) {
    ev.stopPropagation();
    if (!confirm('למחוק את האירוע?')) return;
    try {
        const { error } = await db.from('events').delete().eq('id', id);
        if (error) throw error;
        await loadEvents();
    } catch(e) { alert('שגיאה: ' + e.message); }
}

// ── Filters ──
function setupFilters() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeCat = btn.dataset.cat;
            applyFilter();
        });
    });
    document.getElementById('date-filter').addEventListener('change', e => { dateFilter = e.target.value; applyFilter(); });
}

function clearDate() { document.getElementById('date-filter').value = ''; dateFilter = ''; applyFilter(); }
function switchTab(t, el) { activeTab = t; document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active')); el.classList.add('active'); applyFilter(); }

// ── Modal ──
function openModal(id) {
    editingId = id;
    currentImageData = null;
    document.getElementById('img-preview').src = '';
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('img-placeholder').style.display = 'block';
    document.getElementById('upload-area').classList.remove('has-image');
    document.getElementById('f-image').value = '';

    if (id === null) {
        document.getElementById('modal-title').textContent = '✦ הוסף אירוע חדש';
        document.getElementById('modal-submit-btn').textContent = 'פרסם אירוע';
        ['title','desc','date','time','loc','price','tickets','materials'].forEach(f => document.getElementById('f-'+f).value = '');
        document.getElementById('f-cat').value = 'music';
    } else {
        const e = events.find(ev => String(ev.id) === String(id));
        if (!e) return;
        document.getElementById('modal-title').textContent = '✏️ עריכת אירוע';
        document.getElementById('modal-submit-btn').textContent = 'שמור שינויים';
        document.getElementById('f-title').value = e.title;
        document.getElementById('f-cat').value = e.cat;
        document.getElementById('f-desc').value = e.desc;
        document.getElementById('f-date').value = e.dateRaw || '';
        document.getElementById('f-time').value = e.time;
        document.getElementById('f-loc').value = e.location;
        document.getElementById('f-price').value = e.price;
        document.getElementById('f-tickets').value = e.tickets || '';
        document.getElementById('f-materials').value = e.materials || '';
        if (e.image) {
            currentImageData = e.image;
            document.getElementById('img-preview').src = e.image;
            document.getElementById('img-preview').style.display = 'block';
            document.getElementById('img-placeholder').style.display = 'none';
            document.getElementById('upload-area').classList.add('has-image');
        }
    }
    document.getElementById('overlay').classList.add('open');
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); editingId = null; }
function overlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

async function saveEvent() {
    if (!currentUser) { openAuth(); return; }
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').style.borderColor = '#f075a8'; setTimeout(() => document.getElementById('f-title').style.borderColor = '', 1500); return; }

    const cat = document.getElementById('f-cat').value;
    const dateRaw = document.getElementById('f-date').value;
    const dateDisplay = dateRaw ? new Date(dateRaw + 'T12:00:00').toLocaleDateString('he-IL', {day:'numeric',month:'long',year:'numeric'}) : '-';

    const payload = {
        cat, title,
        description: document.getElementById('f-desc').value.trim(),
        date_raw: dateRaw,
        date_display: dateDisplay,
        time: document.getElementById('f-time').value || '-',
        location: document.getElementById('f-loc').value || 'חיפה',
        price: document.getElementById('f-price').value || 'כניסה חופשית',
        tickets: document.getElementById('f-tickets').value.trim(),
        materials: document.getElementById('f-materials').value.trim(),
        image: currentImageData || null
    };

    try {
        let error;
        if (editingId !== null) {
            const res = await db.from('events').update(payload).eq('id', editingId);
            error = res.error;
        } else {
            const res = await db.from('events').insert({ ...payload, user_id: currentUser.id });
            error = res.error;
        }
        if (error) throw error;
        closeModal();
        await loadEvents();
    } catch(e) { alert('שגיאה: ' + e.message); }
}

function handleImageUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        currentImageData = ev.target.result;
        document.getElementById('img-preview').src = currentImageData;
        document.getElementById('img-preview').style.display = 'block';
        document.getElementById('img-placeholder').style.display = 'none';
        document.getElementById('upload-area').classList.add('has-image');
    };
    reader.readAsDataURL(file);
}

function removeImage(e) {
    e.preventDefault(); e.stopPropagation();
    currentImageData = null;
    document.getElementById('img-preview').src = '';
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('img-placeholder').style.display = 'block';
    document.getElementById('upload-area').classList.remove('has-image');
    document.getElementById('f-image').value = '';
}
